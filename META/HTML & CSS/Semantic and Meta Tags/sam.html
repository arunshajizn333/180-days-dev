<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta property="og:title" content="Non-Semantic Webpage">
    <meta property="og:description" content="A simple webpage demonstrating non-semantic HTML">
    <meta property="og:image" content="image.jpg">
    <meta property="og:url" content="https://non-semantic-webpage">
    <meta name="twitter:card" content="summary_large_image">
    
    <title>Non-Semantic Webpage</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Welcome to My Blog</h1>
    </header>

    <nav>
        <ul>
            <li><a href="#about">About</a></li>
            <li><a href="#articles">Articles</a></li>
            <li><a href="#contact">Contact</a></li>
        </ul>
    </nav>

    <main>

        <section id="about">
            <h2>About Me</h2>
            <p>This is a brief introduction about the blog's author.</p>
        </section   >

        <section id="articles">
            <h2>Latest Articles</h2>

            <article class="article">
                <h3>Article 1</h3>
                <p>Summary of the first article.</p>
            </article>
            <article class="article">
                <h3>Article 2</h3>
                <p>Summary of the second article.</p>
            </article>
        </section>
    </main  >

    <footer class="footer">
        <p>Contact me at email@example.com</p>
    </footer>
</body>
</html>
